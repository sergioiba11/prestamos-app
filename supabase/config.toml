
[functions.crear-empleado]
enabled = true
verify_jwt = true
import_map = "./functions/crear-empleado/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/crear-empleado/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/crear-empleado/*.html" ]

[functions.crear-cliente]
enabled = true
verify_jwt = true
entrypoint = "./functions/crear-cliente/index.ts"

[functions.registrar-pago]
enabled = true
verify_jwt = false
entrypoint = "./functions/registrar-pago/index.ts"

[functions.crear-pago-mp]
enabled = true
verify_jwt = false
entrypoint = "./functions/crear-pago-mp/index.ts"

[functions.webhook-mp]
enabled = true
verify_jwt = false
entrypoint = "./functions/webhook-mp/index.ts"

[functions.registro-cliente-publico]
verify_jwt = false

[functions.resolver-identificador-login]
verify_jwt = false
